<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Conversation Tree — Live</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #header {
    height: 52px;
    background: #1e293b;
    border-bottom: 1px solid #334155;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    flex-shrink: 0;
  }

  #header h1 { font-size: 16px; font-weight: 600; }
  #header .status { font-size: 12px; color: #94a3b8; }
  #header .status.analyzing { color: #f59e0b; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .dot-green { background: #22c55e; }
  .dot-yellow { background: #f59e0b; animation: pulse 1.5s infinite; }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  .legend {
    display: flex; gap: 14px; margin-left: auto; font-size: 11px; color: #64748b;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  #main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Left: Tree */
  #tree-panel {
    flex: 1;
    position: relative;
  }

  #tree-panel svg { width: 100%; height: 100%; }

  .link { fill: none; stroke: #334155; stroke-width: 2; }
  .node-group { cursor: pointer; }
  .node-rect { fill: #1e293b; stroke: #475569; stroke-width: 1.5; rx: 8; ry: 8; transition: stroke 0.2s; }
  .node-group:hover .node-rect { stroke: #94a3b8; }
  .node-group.active .node-rect { stroke: #22c55e; stroke-width: 2; filter: drop-shadow(0 0 10px rgba(34,197,94,0.25)); }
  .status-bar { rx: 8; ry: 8; }
  .node-label { fill: #f1f5f9; font-size: 12px; font-weight: 600; }
  .node-type-badge { font-size: 9px; font-weight: 500; }
  .node-msg-count { fill: #64748b; font-size: 10px; }

  #empty-state {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    text-align: center; color: #475569;
  }
  #empty-state h2 { font-size: 20px; margin-bottom: 8px; color: #64748b; }
  #empty-state p { font-size: 13px; }

  /* Right: Chat + Input */
  #chat-panel {
    width: 380px;
    border-left: 1px solid #334155;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  #chat-header {
    padding: 12px 16px;
    background: #1e293b;
    border-bottom: 1px solid #334155;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #message-count { font-size: 11px; color: #64748b; font-weight: 400; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }

  .msg {
    margin-bottom: 10px;
    font-size: 13px;
    line-height: 1.5;
  }

  .msg .speaker {
    font-weight: 600;
    color: #06b6d4;
    margin-right: 4px;
  }

  .msg .text { color: #cbd5e1; }
  .msg .idx { color: #475569; font-size: 10px; margin-right: 4px; }

  #input-area {
    padding: 12px 16px;
    background: #1e293b;
    border-top: 1px solid #334155;
  }

  #speaker-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  #speaker-input {
    width: 120px;
    padding: 6px 10px;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 6px;
    color: #e2e8f0;
    font-size: 13px;
    outline: none;
  }

  #speaker-input:focus { border-color: #06b6d4; }

  #text-input {
    width: 100%;
    padding: 8px 12px;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 6px;
    color: #e2e8f0;
    font-size: 13px;
    outline: none;
    resize: none;
    height: 38px;
  }

  #text-input:focus { border-color: #06b6d4; }

  #audio-controls {
    padding: 10px 16px;
    background: #1e293b;
    border-bottom: 1px solid #334155;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #audio-controls button {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid #475569;
    background: #334155;
    color: #94a3b8;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  #audio-controls button:hover {
    background: #475569;
    color: #e2e8f0;
  }

  #audio-controls button.active {
    background: #052e16;
    border-color: #22c55e;
    color: #22c55e;
  }

  #audio-status {
    font-size: 11px;
    color: #64748b;
    margin-left: 4px;
  }

  #input-hint {
    font-size: 11px;
    color: #475569;
    margin-top: 6px;
  }

  #analyze-btn {
    padding: 5px 12px;
    background: #334155;
    border: 1px solid #475569;
    border-radius: 6px;
    color: #94a3b8;
    font-size: 12px;
    cursor: pointer;
    margin-left: auto;
  }
  #analyze-btn:hover { background: #475569; color: #e2e8f0; }


  /* Detail panel */
  #detail-panel {
    position: fixed;
    top: 52px; bottom: 0; left: 0;
    width: 400px;
    background: #1e293b;
    border-right: 1px solid #334155;
    z-index: 300;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    overflow-y: auto;
    padding: 24px;
  }
  #detail-panel.open { transform: translateX(0); }
  #detail-panel .close-btn {
    position: absolute; top: 12px; right: 12px;
    background: #334155; border: none; color: #94a3b8;
    width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  #detail-panel .close-btn:hover { background: #475569; color: #e2e8f0; }
  #detail-panel h2 { font-size: 18px; font-weight: 700; margin-bottom: 10px; padding-right: 36px; }
  .detail-meta { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
  .badge-active { background: #052e16; color: #22c55e; }
  .badge-paused { background: #451a03; color: #f59e0b; }
  .badge-subtopic { background: #083344; color: #06b6d4; }
  .badge-tangent { background: #2e1065; color: #a855f7; }
  .badge-progression { background: #1e293b; color: #94a3b8; border: 1px solid #475569; }
  .badge-main_topic { background: #1e293b; color: #e2e8f0; border: 1px solid #475569; }
  .detail-section { margin-bottom: 16px; }
  .detail-section h3 { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
  .detail-section p { font-size: 13px; color: #cbd5e1; line-height: 1.5; }
  .detail-msg { padding: 8px 10px; background: #0f172a; border-radius: 6px; margin-bottom: 6px; font-size: 12px; line-height: 1.4; }
  .detail-msg .speaker { font-weight: 600; color: #06b6d4; }
</style>
</head>
<body>

<div id="header">
  <h1>Conversation Tree</h1>
  <span class="status" id="status"><span class="dot dot-green"></span>Listening</span>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Active</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Paused</div>
    <div class="legend-item"><div class="legend-dot" style="background:#a855f7"></div>Tangent</div>
    <div class="legend-item"><div class="legend-dot" style="background:#06b6d4"></div>Subtopic</div>
  </div>
</div>

<div id="main">
  <div id="tree-panel">
    <div id="empty-state">
      <h2>Start a conversation</h2>
      <p>Type messages in the panel on the right.<br>The topic tree will appear here as topics emerge.</p>
    </div>
  </div>

  <div id="chat-panel">
    <div id="chat-header">
      <span>Conversation</span>
      <span id="message-count">0 messages</span>
    </div>
    <div id="audio-controls">
      <button id="tab-capture-btn" onclick="toggleTabCapture()">Capture Tab + Mic</button>
      <button id="mic-capture-btn" onclick="toggleMicCapture()">Mic Only</button>
      <span id="audio-status"></span>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <div id="speaker-row">
        <input type="text" id="speaker-input" placeholder="Speaker name" value="Alice">
        <button id="analyze-btn" onclick="forceAnalyze()">Analyze Now</button>
      </div>
      <textarea id="text-input" placeholder="Type a message and press Enter..." rows="1"></textarea>
      <div id="input-hint">Enter to send, or use audio capture buttons above.</div>
    </div>
  </div>
</div>

<div id="detail-panel">
  <button class="close-btn" onclick="closeDetail()">&times;</button>
  <div id="detail-content"></div>
</div>

<script>
// WebSocket
const ws = new WebSocket('ws://' + location.host);
let currentTree = null;
let allMessages = [];

const STATUS_COLORS = { active:'#22c55e', paused:'#f59e0b', completed:'#9ca3af', abandoned:'#ef4444' };
const TYPE_COLORS = { subtopic:'#06b6d4', tangent:'#a855f7', return:'#3b82f6', progression:'#64748b' };
const NODE_W = 200, NODE_H = 50, H_SPACE = 270, V_SPACE = 72;

ws.onmessage = (e) => {
  const data = JSON.parse(e.data);
  switch (data.type) {
    case 'tree_update':
      currentTree = data.tree;
      allMessages = data.messages || [];
      renderTree();
      updateMessageCount(data.totalMessages || allMessages.length);
      setStatus('listening');
      break;
    case 'new_message':
      addMessageToChat(data.message);
      updateMessageCount(data.totalMessages);
      break;
    case 'analyzing':
      setStatus('analyzing');
      break;
    case 'error':
      console.error('Server error:', data.message);
      setStatus('listening');
      break;
  }
};

ws.onclose = () => setStatus('disconnected');

// Input handling
const textInput = document.getElementById('text-input');
const speakerInput = document.getElementById('speaker-input');

textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const text = textInput.value.trim();
    const speaker = speakerInput.value.trim() || 'Anonymous';
    if (!text) return;
    ws.send(JSON.stringify({ type: 'text_message', speaker, text }));
    textInput.value = '';
  }
});

function forceAnalyze() {
  ws.send(JSON.stringify({ type: 'force_analyze' }));
}

function setStatus(s) {
  const el = document.getElementById('status');
  if (s === 'analyzing') {
    el.innerHTML = '<span class="dot dot-yellow"></span>Analyzing...';
    el.className = 'status analyzing';
  } else if (s === 'disconnected') {
    el.innerHTML = '<span class="dot" style="background:#ef4444"></span>Disconnected';
    el.className = 'status';
  } else {
    el.innerHTML = '<span class="dot dot-green"></span>Listening';
    el.className = 'status';
  }
}

function updateMessageCount(n) {
  document.getElementById('message-count').textContent = n + ' message' + (n !== 1 ? 's' : '');
}

function addMessageToChat(msg) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = '<span class="idx">#' + msg.index + '</span><span class="speaker">' +
    esc(msg.speaker) + ':</span> <span class="text">' + esc(msg.text) + '</span>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// Tree rendering
let svg, g, zoom;

function initSvg() {
  const container = document.getElementById('tree-panel');
  svg = d3.select(container).append('svg');
  g = svg.append('g');
  zoom = d3.zoom().scaleExtent([0.2, 3]).on('zoom', (e) => g.attr('transform', e.transform));
  svg.call(zoom);
}

initSvg();

function renderTree() {
  if (!currentTree || !currentTree.nodes) return;

  const nodeCount = Object.keys(currentTree.nodes).length;
  if (nodeCount <= 1) return; // Only root

  document.getElementById('empty-state').style.display = 'none';

  // Build hierarchy
  function buildNode(id) {
    const n = currentTree.nodes[id];
    if (!n) return null;
    const children = (n.children || []).map(c => buildNode(c)).filter(Boolean);
    return { ...n, children: children.length > 0 ? children : null };
  }

  const root = d3.hierarchy(buildNode(currentTree.rootId));
  d3.tree().nodeSize([V_SPACE, H_SPACE])(root);

  // Clear and redraw
  g.selectAll('*').remove();

  // Links
  g.selectAll('.link')
    .data(root.links())
    .enter().append('path')
    .attr('class', 'link')
    .attr('d', d3.linkHorizontal().x(d => d.y).y(d => d.x));

  // Nodes
  const nodes = g.selectAll('.node-group')
    .data(root.descendants())
    .enter().append('g')
    .attr('class', d => 'node-group' + (d.data.id === currentTree.activeTopicId ? ' active' : ''))
    .attr('transform', d => 'translate(' + d.y + ',' + d.x + ')')
    .on('click', (e, d) => showDetail(d.data));

  nodes.each(function(d) {
    const el = d3.select(this);
    if (d.data.topicType === 'root') {
      el.append('circle').attr('r', 5).attr('fill', '#475569');
      return;
    }

    const hw = NODE_W / 2, hh = NODE_H / 2;

    el.append('rect').attr('class', 'node-rect')
      .attr('x', -hw).attr('y', -hh).attr('width', NODE_W).attr('height', NODE_H);

    el.append('rect').attr('class', 'status-bar')
      .attr('x', -hw).attr('y', -hh).attr('width', 4).attr('height', NODE_H)
      .attr('fill', STATUS_COLORS[d.data.status] || '#475569');

    const label = d.data.label.length > 22 ? d.data.label.slice(0, 20) + '...' : d.data.label;
    const hasType = d.data.topicType !== 'main_topic' && TYPE_COLORS[d.data.topicType];

    el.append('text').attr('class', 'node-label')
      .attr('x', -hw + 12).attr('y', hasType ? -4 : 2)
      .attr('dominant-baseline', 'middle').text(label);

    if (hasType) {
      const tl = d.data.topicType === 'progression' ? 'flow' : d.data.topicType;
      el.append('text').attr('class', 'node-type-badge')
        .attr('x', -hw + 12).attr('y', 12)
        .attr('fill', TYPE_COLORS[d.data.topicType]).text(tl);
    }

    const mc = (d.data.messageIndices || []).length;
    el.append('text').attr('class', 'node-msg-count')
      .attr('x', hw - 10).attr('y', 2)
      .attr('text-anchor', 'end').attr('dominant-baseline', 'middle')
      .text(mc + ' msg' + (mc !== 1 ? 's' : ''));
  });

  fitView();
}

function fitView() {
  const bounds = g.node().getBBox();
  const container = document.getElementById('tree-panel').getBoundingClientRect();
  const pad = 60;
  const scale = Math.min((container.width - pad * 2) / bounds.width, (container.height - pad * 2) / bounds.height, 1.1);
  const tx = container.width / 2 - (bounds.x + bounds.width / 2) * scale;
  const ty = container.height / 2 - (bounds.y + bounds.height / 2) * scale;
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

// Detail panel
function showDetail(node) {
  if (node.topicType === 'root') return;
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');

  const path = [];
  let cur = node;
  while (cur) {
    if (cur.topicType !== 'root') path.unshift(cur.label);
    cur = currentTree.nodes[cur.parentId];
  }

  const msgs = (node.messageIndices || []).sort((a,b) => a - b)
    .map(i => allMessages.find(m => m.index === i)).filter(Boolean);

  const summary = node.runningSummary || node.summary || '';

  content.innerHTML =
    '<h2>' + esc(node.label) + '</h2>' +
    '<div class="detail-meta">' +
      '<span class="badge badge-' + node.status + '">' + node.status + '</span>' +
      '<span class="badge badge-' + node.topicType + '">' + node.topicType.replace('_',' ') + '</span>' +
    '</div>' +
    '<div class="detail-section"><h3>Summary</h3><p>' + esc(summary) + '</p></div>' +
    '<div class="detail-section"><h3>Path</h3><p style="color:#06b6d4;font-size:12px">' +
      path.map(p => esc(p)).join(' > ') + '</p></div>' +
    '<div class="detail-section"><h3>Messages (' + msgs.length + ')</h3>' +
      msgs.map(m => '<div class="detail-msg"><span class="speaker">' +
        esc(m.speaker) + ':</span> ' + esc(m.text) + '</div>').join('') +
    '</div>';

  panel.classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ===== Audio Capture =====

let audioCapture = null; // { stream, audioContext, processor, source, type }

async function toggleTabCapture() {
  if (audioCapture && audioCapture.type === 'tab') {
    stopAudioCapture();
    return;
  }
  if (audioCapture) stopAudioCapture();

  try {
    // Get tab audio
    const tabStream = await navigator.mediaDevices.getDisplayMedia({
      video: true,
      audio: true,
      preferCurrentTab: false,
    });

    // Discard video track
    tabStream.getVideoTracks().forEach(t => t.stop());

    const hasTabAudio = tabStream.getAudioTracks().length > 0;

    // Also get mic audio
    let micStream;
    try {
      micStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true }
      });
    } catch (micErr) {
      // Mic denied — use tab only if we have it
      if (!hasTabAudio) {
        setAudioStatus('No audio — tab had no audio and mic was denied');
        tabStream.getTracks().forEach(t => t.stop());
        return;
      }
    }

    // Merge both streams into one using AudioContext
    const audioContext = new AudioContext();
    const destination = audioContext.createMediaStreamDestination();

    if (hasTabAudio) {
      const tabSource = audioContext.createMediaStreamSource(tabStream);
      tabSource.connect(destination);
    }

    if (micStream) {
      const micSource = audioContext.createMediaStreamSource(micStream);
      micSource.connect(destination);
    }

    // The merged stream
    const mergedStream = destination.stream;

    // Store extra streams for cleanup
    mergedStream._extraStreams = [tabStream, micStream].filter(Boolean);
    mergedStream._extraContext = audioContext;

    const label = hasTabAudio && micStream ? 'Tab + Mic' : hasTabAudio ? 'Tab only' : 'Mic only';
    setAudioStatus('Capturing: ' + label);

    await startAudioPipeline(mergedStream, 'tab');

    // Handle tab sharing ending
    if (hasTabAudio) {
      tabStream.getAudioTracks()[0].onended = () => stopAudioCapture();
    }
  } catch (err) {
    if (err.name === 'NotAllowedError') {
      setAudioStatus('Tab sharing cancelled');
    } else {
      setAudioStatus('Error: ' + err.message);
    }
  }
}

async function toggleMicCapture() {
  if (audioCapture && audioCapture.type === 'mic') {
    stopAudioCapture();
    return;
  }
  if (audioCapture) stopAudioCapture(); // stop tab if running

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 16000 }
    });
    await startAudioPipeline(stream, 'mic');
  } catch (err) {
    setAudioStatus('Mic access denied');
  }
}

async function startAudioPipeline(stream, type) {
  // Use default AudioContext sample rate — Chrome won't resample getDisplayMedia streams
  // to a custom rate reliably, which causes silence
  const audioContext = new AudioContext();
  const actualSampleRate = audioContext.sampleRate;
  console.log('AudioContext sample rate:', actualSampleRate);

  // Tell server to start Deepgram with the actual sample rate
  ws.send(JSON.stringify({ type: 'start_audio', sampleRate: actualSampleRate, channels: 1 }));

  // Wait for server to confirm Deepgram is ready
  await new Promise((resolve) => {
    const handler = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'audio_ready' || msg.type === 'error') {
        ws.removeEventListener('message', handler);
        if (msg.type === 'error') {
          setAudioStatus('Server error: ' + msg.message);
          stream.getTracks().forEach(t => t.stop());
          audioContext.close();
        }
        resolve();
      }
    };
    ws.addEventListener('message', handler);
    setTimeout(() => { ws.removeEventListener('message', handler); resolve(); }, 5000);
  });

  const source = audioContext.createMediaStreamSource(stream);

  // Use ScriptProcessorNode to get raw PCM
  const bufferSize = 4096;
  const processor = audioContext.createScriptProcessor(bufferSize, 1, 1);

  let chunkCount = 0;
  processor.onaudioprocess = (e) => {
    const inputData = e.inputBuffer.getChannelData(0);

    // Check if audio is actually non-silent
    if (chunkCount < 3) {
      let maxVal = 0;
      for (let i = 0; i < inputData.length; i++) {
        maxVal = Math.max(maxVal, Math.abs(inputData[i]));
      }
      console.log('Audio chunk', chunkCount, 'max amplitude:', maxVal.toFixed(4));
    }
    chunkCount++;

    // Convert float32 to int16 PCM
    const pcm = new Int16Array(inputData.length);
    for (let i = 0; i < inputData.length; i++) {
      const s = Math.max(-1, Math.min(1, inputData[i]));
      pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
    }

    // Send as base64 to server
    const bytes = new Uint8Array(pcm.buffer);
    let binary = '';
    for (let i = 0; i < bytes.length; i++) {
      binary += String.fromCharCode(bytes[i]);
    }
    ws.send(JSON.stringify({ type: 'audio_data', audio: btoa(binary) }));
  };

  source.connect(processor);
  processor.connect(audioContext.destination);

  audioCapture = { stream, audioContext, processor, source, type };

  // Update UI
  const btn = type === 'tab' ? 'tab-capture-btn' : 'mic-capture-btn';
  document.getElementById(btn).classList.add('active');
  document.getElementById(btn).textContent = type === 'tab' ? 'Stop Tab Capture' : 'Stop Mic';
  setAudioStatus(type === 'tab' ? 'Capturing tab audio...' : 'Capturing mic...');

  // Handle stream ending (user clicks "Stop sharing" in browser)
  stream.getAudioTracks()[0].onended = () => stopAudioCapture();
}

function stopAudioCapture() {
  if (!audioCapture) return;

  const { stream, audioContext, processor, source, type } = audioCapture;

  source.disconnect();
  processor.disconnect();
  audioContext.close();
  stream.getTracks().forEach(t => t.stop());

  // Clean up extra streams from merged tab+mic capture
  if (stream._extraStreams) {
    stream._extraStreams.forEach(s => s.getTracks().forEach(t => t.stop()));
  }
  if (stream._extraContext) {
    stream._extraContext.close();
  }

  ws.send(JSON.stringify({ type: 'stop_audio' }));

  const btn = type === 'tab' ? 'tab-capture-btn' : 'mic-capture-btn';
  document.getElementById(btn).classList.remove('active');
  document.getElementById(btn).textContent = type === 'tab' ? 'Capture Tab + Mic' : 'Mic Only';
  setAudioStatus('');

  audioCapture = null;
}

function setAudioStatus(text) {
  document.getElementById('audio-status').textContent = text;
}
</script>
</body>
</html>
